version: '3.9'

services:
  lsm-write-heavy:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
    container_name: lsm-write-heavy
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - ./results:/app/results
    environment:
      - SCENARIO=write_heavy
      - MEMTABLE_SIZE_MB=16
      - NUM_KEYS=500000
    profiles: ['experiments']

  lsm-balanced:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
    container_name: lsm-balanced
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - ./results:/app/results
    environment:
      - SCENARIO=balanced
      - MEMTABLE_SIZE_MB=32
      - NUM_KEYS=250000
    profiles: ['experiments']

  lsm-read-heavy:
    build:
      context: .
      dockerfile: docker/Dockerfile.java
    container_name: lsm-read-heavy
    mem_limit: 512m
    memswap_limit: 512m
    volumes:
      - ./results:/app/results
    environment:
      - SCENARIO=read_heavy
      - MEMTABLE_SIZE_MB=48
      - NUM_KEYS=50000
    profiles: ['experiments']

  analysis:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: lsm-analysis
    volumes:
      - ./results:/app/results
    command: ['python', '/app/scripts/analysis/plot_results.py']
    profiles: ['analysis']
